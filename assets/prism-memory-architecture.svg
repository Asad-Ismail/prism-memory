<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="320" viewBox="0 0 1120 320" role="img" aria-labelledby="title desc">
  <title id="title">PRISM-Memory architecture</title>
  <desc id="desc">A four-step view of PRISM-Memory: dialogue, extraction, indexing, and recall.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbf8"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f9fc"/>
    </linearGradient>
    <style>
      .title { font: 700 24px ui-sans-serif, system-ui, sans-serif; fill: #17324d; }
      .subtitle { font: 14px ui-sans-serif, system-ui, sans-serif; fill: #4a627a; }
      .label { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #16324f; }
      .body { font: 13px ui-sans-serif, system-ui, sans-serif; fill: #425a70; }
      .small { font: 12px ui-sans-serif, system-ui, sans-serif; fill: #5c7489; }
      .box { fill: url(#card); stroke: #bfd0e2; stroke-width: 1.5; rx: 18; ry: 18; }
      .box-accent { fill: #e8f6ec; stroke: #9dc5a7; stroke-width: 1.5; rx: 18; ry: 18; }
      .step { fill: #ffffff; stroke: #bfd0e2; stroke-width: 1.5; }
      .step-text { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #1f4a72; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1120" height="320" fill="url(#bg)" rx="24" ry="24"/>

  <text x="56" y="54" class="title">PRISM-Memory</text>
  <text x="56" y="78" class="subtitle">Write memory once. Retrieve it later.</text>

  <rect x="48" y="106" width="220" height="128" class="box"/>
  <text x="72" y="136" class="label">1. Dialogue</text>
  <text x="72" y="166" class="body">Raw chat turns</text>
  <text x="72" y="190" class="body">Facts, updates, preferences</text>

  <circle cx="292" cy="170" r="16" class="step"/>
  <text x="292" y="170" class="step-text">→</text>

  <rect x="316" y="106" width="220" height="128" class="box-accent"/>
  <text x="340" y="136" class="label">2. Extract</text>
  <text x="340" y="166" class="body">7B LoRA memory writer</text>
  <text x="340" y="190" class="body">0-5 dated memory records</text>

  <circle cx="560" cy="170" r="16" class="step"/>
  <text x="560" y="170" class="step-text">→</text>

  <rect x="584" y="106" width="220" height="128" class="box"/>
  <text x="608" y="136" class="label">3. Index</text>
  <text x="608" y="166" class="body">Store propositions</text>
  <text x="608" y="190" class="body">BM25 + dense + rerank</text>

  <circle cx="828" cy="170" r="16" class="step"/>
  <text x="828" y="170" class="step-text">→</text>

  <rect x="852" y="106" width="220" height="128" class="box"/>
  <text x="876" y="136" class="label">4. Recall</text>
  <text x="876" y="166" class="body">Retrieve supporting memory</text>
  <text x="876" y="190" class="body">Answer later questions</text>

  <text x="56" y="276" class="small">Released model: PRISM-Memory 7B Adapter</text>
  <text x="56" y="296" class="small">Confirmed scores: LoCoMo 0.4981 • LongMemEval 0.4768</text>
</svg>
