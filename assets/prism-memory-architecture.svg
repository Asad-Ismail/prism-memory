<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="236" viewBox="0 0 1120 236" role="img" aria-labelledby="title desc">
  <title id="title">PRISM-Memory pipeline</title>
  <desc id="desc">Four-step PRISM-Memory pipeline showing dialogue, extraction, indexing, and recall.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .frame { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #d7e0ea; stroke-width: 1.5; }
      .card-accent { fill: #ecfdf3; stroke: #9cd5af; stroke-width: 1.5; }
      .pill { fill: #e2e8f0; }
      .pill-accent { fill: #c8f2d5; }
      .step { font: 700 11px ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.1em; fill: #475569; }
      .step-accent { font: 700 11px ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.1em; fill: #166534; }
      .title { font: 700 20px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .body { font: 13px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .body-strong { font: 13px ui-sans-serif, system-ui, sans-serif; fill: #334155; }
      .rail { stroke: #cbd5e1; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="4" y="4" width="1112" height="228" rx="24" ry="24" class="frame"/>

  <line x1="240" y1="118" x2="298" y2="118" class="rail"/>
  <line x1="512" y1="118" x2="570" y2="118" class="rail"/>
  <line x1="784" y1="118" x2="842" y2="118" class="rail"/>

  <rect x="24" y="52" width="216" height="132" rx="20" ry="20" class="card"/>
  <rect x="44" y="72" width="78" height="24" rx="12" ry="12" class="pill"/>
  <text x="83" y="88" text-anchor="middle" class="step">STEP 1</text>
  <text x="44" y="122" class="title">Dialogue</text>
  <text x="44" y="148" class="body">Raw turns, updates,</text>
  <text x="44" y="168" class="body">constraints, and preferences.</text>

  <rect x="296" y="52" width="216" height="132" rx="20" ry="20" class="card-accent"/>
  <rect x="316" y="72" width="78" height="24" rx="12" ry="12" class="pill-accent"/>
  <text x="355" y="88" text-anchor="middle" class="step-accent">STEP 2</text>
  <text x="316" y="122" class="title">Extract</text>
  <text x="316" y="148" class="body">A 7B adapter writes compact,</text>
  <text x="316" y="168" class="body">dated memory records.</text>

  <rect x="568" y="52" width="216" height="132" rx="20" ry="20" class="card"/>
  <rect x="588" y="72" width="78" height="24" rx="12" ry="12" class="pill"/>
  <text x="627" y="88" text-anchor="middle" class="step">STEP 3</text>
  <text x="588" y="122" class="title">Index</text>
  <text x="588" y="148" class="body">Store propositions for hybrid</text>
  <text x="588" y="168" class="body">retrieval and reranking.</text>

  <rect x="840" y="52" width="256" height="132" rx="20" ry="20" class="card"/>
  <rect x="860" y="72" width="78" height="24" rx="12" ry="12" class="pill"/>
  <text x="899" y="88" text-anchor="middle" class="step">STEP 4</text>
  <text x="860" y="122" class="title">Recall</text>
  <text x="860" y="148" class="body">Retrieve supporting memory</text>
  <text x="860" y="168" class="body">for later questions and tasks.</text>
</svg>
